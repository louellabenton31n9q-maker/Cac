services:
  - type: web
    name: vankhanh-server
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn server:app --bind 0.0.0.0:$PORT --workers 1 --threads 4 --worker-class gthread --timeout 120 --keep-alive 5
    envVars:
      - key: SECRET_KEY
        value: server_vkhanh_2026_stable_secret_key_do_not_change
